[build]
  command   = "npm run build"
  publish   = "dist/xeic-runners/browser"
  functions = "netlify/functions"

# Proxy /api/strava → funció serverless
[[redirects]]
  from   = "/api/strava"
  to     = "/.netlify/functions/strava"
  status = 200

# Proxy /api/instagram → funció serverless
[[redirects]]
  from   = "/api/instagram"
  to     = "/.netlify/functions/instagram"
  status = 200

# SPA fallback — totes les rutes van a index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
